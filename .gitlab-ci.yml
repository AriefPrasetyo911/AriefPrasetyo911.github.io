variables:
  GIT_STRATEGY: none

stages:
  - mirror

mirror_to_github:
  stage: mirror
  image: alpine:latest

  before_script:
    - apk add --no-cache git

  script:
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git repo
    - cd repo

    - git checkout master

    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.com"

    - git remote add github https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/${GITHUB_USERNAME}/AriefPrasetyo911.github.io.git

    - git push github HEAD:refs/heads/main --force

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'