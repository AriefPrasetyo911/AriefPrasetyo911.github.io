variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

stages:
  - mirror

mirror_to_github:
  stage: mirror
  image: alpine:latest

  before_script:
    - apk add --no-cache git

  script:
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.com"

    - git remote remove github || true
    - git remote add github https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/${GITHUB_USERNAME}/AriefPrasetyo911.github.io.git

    - git push github HEAD:main --force

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'