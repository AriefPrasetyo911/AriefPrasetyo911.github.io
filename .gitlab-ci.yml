stages:
  - mirror

mirror_to_github:
  stage: mirror
  image: alpine:latest

  before_script:
    - apk add --no-cache git
    
  script:
    - git --version
    - git remote -v
    - git branch -a
    - git rev-parse HEAD
    - git log --oneline --graph -10
    - git count-objects -v

    - git remote remove github || true
    - git remote add github https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/${GITHUB_USERNAME}/AriefPrasetyo911.github.io.git

    - git push github HEAD:refs/heads/main --force

  when: always
